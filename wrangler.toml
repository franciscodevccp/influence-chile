# Influence Chile — Next.js en modo exportación estática (`next.config.js` → output: "export").
# El build genera la carpeta `out/`, NO `.next/standalone`.
#
# Cloudflare Pages (recomendado):
#   - Build command:   pnpm install && pnpm run build
#   - Output directory: out
#   - Deja vacío el "Deploy command" o no uses `wrangler deploy` (eso es para Workers/OpenNext).
#
# Despliegue por CLI (opcional): wrangler pages deploy ./out --project-name=influence-chile

name = "influence-chile"
compatibility_date = "2025-04-01"
pages_build_output_dir = "out"
